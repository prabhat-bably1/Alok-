<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alok Shop</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}
nav{background:#111;padding:15px;text-align:center;}
nav a{color:#fff;margin:10px;text-decoration:none;}

.hero{
background:linear-gradient(135deg,#0d6efd,#00c6ff);
color:#fff;text-align:center;padding:40px;
}

.section{padding:20px;}

button{
padding:10px;
margin:5px;
border:none;
background:#0d6efd;
color:white;
cursor:pointer;
border-radius:5px;
}

.product-box{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
}
</style>
</head>

<body>

<nav>
<a href="#">Home</a>
<a href="#products">Products</a>
</nav>

<div class="hero">
<h1>Alok Cold Drinks & Snacks</h1>
<p>Click category to see products</p>
</div>

<div class="section" id="products">

<h2>Select Category</h2>

<button onclick="showCategory('cold')">Cold Drinks</button>
<button onclick="showCategory('water')">Water Bottles</button>
<button onclick="showCategory('chips')">Chips</button>

<div id="productList"></div>

</div>

<a class="whatsapp" href="https://wa.me/+919178722062">💬</a>

<script>

const data = {
cold: [
{name:"Coca Cola", stock:"Available"},
{name:"Pepsi", stock:"Low Stock"},
{name:"Sprite", stock:"Available"}
],
water: [
{name:"Bisleri 1L", stock:"Available"},
{name:"Kinley 2L", stock:"Available"}
],
chips: [
{name:"Lays", stock:"Available"},
{name:"Kurkure", stock:"Out of Stock"}
]
};

function showCategory(type){
let list = data[type];
let html = "";

list.forEach(item=>{
html += `
<div class="product-box">
<h3>${item.name}</h3>
<p>Stock: ${item.stock}</p>
<button onclick="order('${item.name}')">Order Now</button>
</div>
`;
});

document.getElementById("productList").innerHTML = html;
}

function order(product){
let phone="+919178722062";
let msg="Hello, I want to order " + product;
window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
